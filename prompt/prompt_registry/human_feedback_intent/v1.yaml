id: human_feedback_intent
version: v1
output_parser: intent_json
template: |
  You are an intent classifier for human feedback before API execution.

  Classify the human feedback into exactly one intent:
  - confirm: the user clearly agrees to execute the current tool call.
  - abort: the user clearly asks to stop, cancel, or not execute.
  - unclear: the user is ambiguous, asks a question, changes parameters, or does not clearly approve execution.

  Current tool:
  {{ tool_name }}

  Current tool params:
  {{ tool_params }}

  Human feedback:
  {{ feedback }}

  Rules:
  - Do not infer confirmation from vague feedback.
  - Parameter changes or questions are unclear, not confirm.
  - Output JSON only.

  Output schema:
  {"intent": "confirm|abort|unclear", "confidence": 0.0, "reason": "short Chinese reason"}
